<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tantalum — Sign In</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; background: #0e0e0e; color: #f0ede8; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: #1a1a1a; border: 1px solid #2e2e2e; border-radius: 16px; padding: 48px 40px; width: 100%; max-width: 380px; }
    .logo { text-align: center; margin-bottom: 36px; }
    .logo-icon { font-size: 36px; display: block; margin-bottom: 10px; }
    .logo-name { font-family: Georgia, serif; font-size: 24px; color: #c9a84c; letter-spacing: 0.04em; }
    .logo-sub { font-size: 12px; color: #6a6660; margin-top: 4px; letter-spacing: 0.06em; text-transform: uppercase; }
    label { display: block; font-size: 12px; color: #9a9690; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; font-weight: 500; }
    input { width: 100%; background: #111; border: 1px solid #2e2e2e; border-radius: 8px; padding: 12px 14px; color: #f0ede8; font-size: 15px; font-family: inherit; outline: none; transition: border-color 0.15s; margin-bottom: 16px; }
    input:focus { border-color: #c9a84c; }
    button { width: 100%; background: #c9a84c; color: #1a1200; border: none; border-radius: 8px; padding: 13px; font-size: 15px; font-weight: 600; font-family: inherit; cursor: pointer; transition: background 0.15s; margin-top: 4px; }
    button:hover { background: #e8c97a; }
    .error { background: rgba(175,76,76,0.15); border: 1px solid rgba(175,76,76,0.3); border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #e07070; margin-bottom: 16px; display: none; }
    .error.show { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <span class="logo-icon">&#8986;</span>
      <div class="logo-name">Tantalum</div>
      <div class="logo-sub">Watch &amp; Jewelry Manager</div>
    </div>
    <div class="error" id="err"></div>
    <label>Username</label>
    <input type="text" id="u" autocomplete="username"/>
    <label>Password</label>
    <input type="password" id="p" autocomplete="current-password"/>
    <button id="btn">Sign In</button>
  </div>
  <script>
    async function login() {
      const u = document.getElementById('u').value.trim();
      const p = document.getElementById('p').value;
      const err = document.getElementById('err');
      err.classList.remove('show');
      if (!u || !p) { err.textContent = 'Please enter username and password.'; err.classList.add('show'); return; }
      const res = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: u, password: p }) });
      const data = await res.json();
      if (data.success) { window.location.href = '/'; }
      else { err.textContent = data.error || 'Invalid username or password.'; err.classList.add('show'); }
    }
    document.getElementById('btn').addEventListener('click', login);
    document.getElementById('p').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
    document.getElementById('u').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('p').focus(); });
  </script>
</body>
</html>
